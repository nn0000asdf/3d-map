<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>3D人口マップ</title>

  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body { margin: 0; }
    #map { width: 100vw; height: 100vh; }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibmFveWEwMDAwIiwiYSI6ImNtbmg2ZTNqNDBleTUycXNoMHN0M2JtZTkifQ.BzT3lsdMTuwTXcD0jGZUAw';

    fetch('population_light.geojson')
      .then(res => res.json())
      .then(data => {

        const layer = new deck.ColumnLayer({
          id: 'population',
          data: data.features,

          getPosition: d => d.geometry.coordinates,
          getElevation: d => d.properties.VALUE * 5,

          radius: 2000,
          extruded: true,

          getFillColor: d => {
            const v = d.properties.VALUE;
            return v > 10000 ? [255, 0, 0] :
                   v > 5000  ? [255, 140, 0] :
                   v > 1000  ? [255, 200, 0] :
                               [200, 200, 200];
          }
        });

        const map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/light-v10',
          center: [139.7, 35.6],
          zoom: 6,
          pitch: 60,
          bearing: 30
        });

        const overlay = new deck.MapboxOverlay({
          layers: [layer]
        });

        map.on('load', () => {
          map.addControl(overlay); // ←これが正解
        });

      });
  </script>
</body>
</html>
